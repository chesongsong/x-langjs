# 将 playground 构建并部署到 GitHub Pages
# 仓库设置中需启用 Pages，并选择 "GitHub Actions" 作为 Source

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Use version from package.json "packageManager" field; no explicit version here to avoid mismatch (e.g. ERR_PNPM_BAD_PM_VERSION)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types first (CI 下确保 @x-lang/types 先有 dist，避免后续包解析失败)
        run: pnpm --filter @x-lang/types run build

      - name: Build x-lang (core + packages)
        run: pnpm run build

      - name: Build playground
        env:
          # 部署到 https://<user>.github.io/<repo>/ 时 base 为 /<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @x-lang/playground run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
