# 推送 v* tag 时自动构建并：
#   1. 发布到 GitHub Release（附带 x-langjs.min.js 等产物）
#   2. 发布 @x-langjs/* 到 npmjs.com（需在仓库 Settings → Secrets 中配置 NPM_TOKEN）
# 使用方式：git tag v0.0.1 && git push origin v0.0.1

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # 从 tag 提取版本号（v0.0.1 → 0.0.1），写入各包 package.json
      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NPM="${VERSION#v}"
          echo "VERSION=$VERSION"         >> $GITHUB_ENV
          echo "VERSION_NPM=$VERSION_NPM" >> $GITHUB_ENV
          echo "Building version: $VERSION (npm: $VERSION_NPM)"
          export VERSION_NPM
          for f in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$f', 'utf8'));
              p.version = process.env.VERSION_NPM;
              fs.writeFileSync('$f', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types first
        run: pnpm --filter @x-langjs/types run build

      # generate + tsc + esbuild → index.mjs / index.cjs / x-langjs.min.js
      - name: Build all packages
        run: pnpm run build

      - name: Check build output
        run: |
          echo "=== packages/core/dist ==="
          ls -lh packages/core/dist/
          test -f "packages/core/dist/x-langjs.min.js" || { echo "ERROR: x-langjs.min.js not found!"; exit 1; }

      # 将产物复制到临时目录，文件名含版本号
      - name: Copy release files
        run: |
          mkdir -p dist-release
          cp "packages/core/dist/x-langjs.min.js"     "dist-release/x-langjs-${VERSION_NPM}.min.js"
          cp "packages/core/dist/x-langjs.min.js.map" "dist-release/x-langjs-${VERSION_NPM}.min.js.map" 2>/dev/null || true
          cp "packages/core/dist/index.mjs"         "dist-release/x-langjs-${VERSION_NPM}.esm.mjs"
          cp "packages/core/dist/index.cjs"         "dist-release/x-langjs-${VERSION_NPM}.cjs"
          echo "=== dist-release ==="
          ls -lh dist-release/

      # 从 CHANGELOG 提取当前版本的发行说明
      - name: Generate release notes
        run: |
          VERSION_ESC=$(printf '%s' "${VERSION_NPM}" | sed 's/\./\\./g')
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## \[${VERSION_ESC}\]/,/^## /p" CHANGELOG.md | sed '$d' > release-notes.md 2>/dev/null || true
          fi
          if [ ! -s release-notes.md ]; then
            printf "## %s\n\n详见 [CHANGELOG.md](https://github.com/chesongsong/x-langjs/blob/%s/CHANGELOG.md)。\n" \
              "$VERSION" "$VERSION" > release-notes.md
          fi
          echo "=== Release notes ===" && cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist-release/x-langjs-${{ env.VERSION_NPM }}.min.js
            dist-release/x-langjs-${{ env.VERSION_NPM }}.esm.mjs
            dist-release/x-langjs-${{ env.VERSION_NPM }}.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布 @x-langjs/* 到 npmjs.com（需在仓库 Settings → Secrets 中配置 NPM_TOKEN）
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish -r --no-git-checks --access public
