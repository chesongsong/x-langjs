# 推送 v* tag 时自动构建并：
#   1. 发布到 GitHub Release（附带 x-lang.min.js 等产物）
#   2. 发布 @x-lang/* 到 npmjs.com（需配置 NPM_TOKEN secret）
#   3. 发布 @chesongsong/x-lang-core 到 GitHub Packages（使用内置 GITHUB_TOKEN，无需额外配置）
# 使用方式：git tag v0.0.1 && git push origin v0.0.1

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      # 从 tag 提取版本号（v0.0.1 → 0.0.1），写入各包 package.json
      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NPM="${VERSION#v}"
          echo "VERSION=$VERSION"         >> $GITHUB_ENV
          echo "VERSION_NPM=$VERSION_NPM" >> $GITHUB_ENV
          echo "Building version: $VERSION (npm: $VERSION_NPM)"
          export VERSION_NPM
          for f in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$f', 'utf8'));
              p.version = process.env.VERSION_NPM;
              fs.writeFileSync('$f', JSON.stringify(p, null, 2) + '\n');
            "
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build types first
        run: pnpm --filter @x-lang/types run build

      # generate + tsc + esbuild → index.mjs / index.cjs / x-lang.min.js
      - name: Build all packages
        run: pnpm run build

      - name: Check build output
        run: |
          echo "=== packages/core/dist ==="
          ls -lh packages/core/dist/
          test -f "packages/core/dist/x-lang.min.js" || { echo "ERROR: x-lang.min.js not found!"; exit 1; }

      # 将产物复制到临时目录，文件名含版本号
      - name: Copy release files
        run: |
          mkdir -p dist-release
          cp "packages/core/dist/x-lang.min.js"     "dist-release/x-lang-${VERSION_NPM}.min.js"
          cp "packages/core/dist/x-lang.min.js.map" "dist-release/x-lang-${VERSION_NPM}.min.js.map" 2>/dev/null || true
          cp "packages/core/dist/index.mjs"         "dist-release/x-lang-${VERSION_NPM}.esm.mjs"
          cp "packages/core/dist/index.cjs"         "dist-release/x-lang-${VERSION_NPM}.cjs"
          echo "=== dist-release ==="
          ls -lh dist-release/

      # 从 CHANGELOG 提取当前版本的发行说明
      - name: Generate release notes
        run: |
          VERSION_ESC=$(printf '%s' "${VERSION_NPM}" | sed 's/\./\\./g')
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## \[${VERSION_ESC}\]/,/^## /p" CHANGELOG.md | sed '$d' > release-notes.md 2>/dev/null || true
          fi
          if [ ! -s release-notes.md ]; then
            printf "## %s\n\n详见 [CHANGELOG.md](https://github.com/chesongsong/x-lang/blob/%s/CHANGELOG.md)。\n" \
              "$VERSION" "$VERSION" > release-notes.md
          fi
          echo "=== Release notes ===" && cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist-release/x-lang-${{ env.VERSION_NPM }}.min.js
            dist-release/x-lang-${{ env.VERSION_NPM }}.esm.mjs
            dist-release/x-lang-${{ env.VERSION_NPM }}.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 发布 @x-lang/* 到 npmjs.com（需配置 NPM_TOKEN secret）
      - name: Publish to npmjs.com
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish -r --no-git-checks --access public

      # 发布 @chesongsong/x-lang-core 到 GitHub Packages（使用内置 GITHUB_TOKEN，无需额外配置）
      # GitHub Packages 要求 scope 必须匹配仓库所有者，所以用 @chesongsong/x-lang-core
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 基于已构建的 core/dist，构造一个专用于 GitHub Packages 的临时发布目录
          mkdir -p gh-publish/dist

          # 复制构建产物
          cp -r packages/core/dist/. gh-publish/dist/

          # 构造 package.json（scope 换成 @chesongsong，registry 指向 GitHub Packages）
          cat > gh-publish/package.json << PKGJSON
          {
            "name": "@chesongsong/x-lang-core",
            "version": "${VERSION_NPM}",
            "description": "Core package for x-lang — parse, tokenize, and work with x-lang AST",
            "type": "module",
            "main": "./dist/index.cjs",
            "module": "./dist/index.mjs",
            "types": "./dist/index.d.ts",
            "exports": {
              ".": {
                "types": "./dist/index.d.ts",
                "import": "./dist/index.mjs",
                "require": "./dist/index.cjs"
              }
            },
            "files": ["dist"],
            "repository": {
              "type": "git",
              "url": "https://github.com/chesongsong/x-lang.git"
            },
            "publishConfig": {
              "registry": "https://npm.pkg.github.com"
            },
            "dependencies": {
              "antlr4ng": "^3.0.16"
            }
          }
          PKGJSON

          # 写入 .npmrc 使用 GITHUB_TOKEN 鉴权
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > gh-publish/.npmrc

          cd gh-publish
          npm publish --access public
