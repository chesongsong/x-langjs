<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x-lang Playground</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div id="app">
    <main id="main">
      <section id="editor-panel">
        <div id="editor-toolbar">
          <button id="btn-stream" class="toolbar-btn primary">流式演示</button>
          <button id="btn-stop" class="toolbar-btn danger" style="display:none">停止</button>
          <span id="stream-status" class="stream-status"></span>
        </div>
        <div id="editor"></div>
      </section>

      <div id="divider"></div>

      <section id="output-panel">
        <div id="event-status"></div>
        <div id="output-content"></div>
      </section>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
